# SFTP Service Defaults — sourced by every script
# Override any value via environment variables before sourcing.

SFTP_DEFAULT_PORT="${SFTP_DEFAULT_PORT:-22}"
SFTP_CONN_TIMEOUT="${SFTP_CONN_TIMEOUT:-30}"
SFTP_AUTH_TIMEOUT="${SFTP_AUTH_TIMEOUT:-30}"
SFTP_TRANSFER_TIMEOUT="${SFTP_TRANSFER_TIMEOUT:-300}"
SFTP_WORKING_DIR="${SFTP_WORKING_DIR:-/opt/sftp-service/data}"
SFTP_LOG_DIR="${SFTP_LOG_DIR:-/opt/sftp-service/logs}"
SFTP_KEYS_DIR="${SFTP_KEYS_DIR:-/opt/sftp-service/keys}"
SFTP_KNOWN_HOSTS="${SFTP_KNOWN_HOSTS:-/opt/sftp-service/.ssh/known_hosts}"
SFTP_STRICT_HOST="${SFTP_STRICT_HOST:-true}"
SFTP_MAX_RETRIES="${SFTP_MAX_RETRIES:-3}"
SFTP_RETRY_DELAY="${SFTP_RETRY_DELAY:-5}"
SFTP_LOG_RETENTION_DAYS="${SFTP_LOG_RETENTION_DAYS:-30}"
SFTP_LOG_MAX_SIZE_KB="${SFTP_LOG_MAX_SIZE_KB:-10240}"
